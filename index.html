<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <title>TarotMe — Tarot Rider-Waite</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a14">
  <meta name="description" content="Rider-Waite Tarot library — 78 cards and personalized AI readings. / Biblioteca del Tarot Rider-Waite — 78 cartas y lecturas con IA.">
  <!-- PWA: Apple-specific -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TarotMe">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body>

  <!-- Canvas starfield (filled by app.js) -->
  <canvas id="starfield" aria-hidden="true"></canvas>

  <!-- ══════════════════════════════════════
       MODAL: Disclaimer (first visit)
  ══════════════════════════════════════ -->
  <div id="disclaimer-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="disc-title">
    <div class="modal-box disclaimer-box">
      <div class="disc-icon">⚠️</div>
      <h2 id="disc-title" data-i18n="disc_title"></h2>
      <p data-i18n-html="disc_body1"></p>
      <p data-i18n-html="disc_body2"></p>
      <button id="disclaimer-accept" class="btn-primary" data-i18n="disc_accept"></button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MODAL: Settings (API key)
  ══════════════════════════════════════ -->
  <div id="settings-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-box settings-box">
      <button class="modal-close" id="settings-close" aria-label="Close / Cerrar">✕</button>
      <h2 id="settings-title" data-i18n="settings_title"></h2>
      <p data-i18n="settings_body"></p>
      <div class="field-group">
        <label for="api-key-input" data-i18n="settings_label"></label>
        <input type="password" id="api-key-input" placeholder="sk-ant-…" autocomplete="off" spellcheck="false">
        <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" class="link-small" data-i18n="settings_link"></a>
      </div>
      <div class="settings-actions">
        <button id="api-key-save" class="btn-primary" data-i18n="settings_save"></button>
        <button id="api-key-clear" class="btn-danger-outline" data-i18n="settings_clear"></button>
      </div>
      <p id="settings-status" class="settings-status"></p>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MODAL: Card detail
  ══════════════════════════════════════ -->
  <div id="card-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="card-modal-title">
    <div class="modal-box card-detail-box">
      <button class="modal-close" id="card-modal-close" aria-label="Close / Cerrar">✕</button>
      <div class="card-detail-inner">
        <div class="card-detail-image-wrap">
          <img id="card-detail-img" src="" alt="" class="card-detail-img">
          <div id="card-detail-badge" class="arcana-badge"></div>
        </div>
        <div class="card-detail-info">
          <p id="card-detail-numero" class="card-detail-numero"></p>
          <h2 id="card-modal-title" class="card-detail-nombre"></h2>
          <p id="card-detail-ingles" class="card-detail-ingles"></p>
          <div id="card-detail-keywords" class="keywords-list"></div>
          <div class="card-tabs">
            <button class="card-tab active" data-tab="upright" data-i18n="tab_upright"></button>
            <button class="card-tab" data-tab="reversed" data-i18n="tab_reversed"></button>
            <button class="card-tab" data-tab="symbolism" data-i18n="tab_symbolism"></button>
          </div>
          <div id="card-tab-content" class="card-tab-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       HEADER
  ══════════════════════════════════════ -->
  <header class="app-header">
    <div class="header-logo">
      <span class="logo-moon">☽</span>
      <span class="logo-text">TarotMe</span>
    </div>
    <nav class="app-nav" role="navigation">
      <button class="nav-tab active" data-section="arcanos" data-i18n="nav_cartas"></button>
      <button class="nav-tab" data-section="lectura" data-i18n="nav_lectura"></button>
      <button class="nav-tab" data-section="faq" data-i18n="nav_faq"></button>
    </nav>
    <div class="header-actions">
      <button id="install-btn" class="install-btn hidden" aria-label="Install app / Instalar app">
        <span class="install-icon">⬇</span>
        <span class="install-label" data-i18n="install_btn"></span>
      </button>
      <button id="lang-btn" class="lang-btn" aria-label="Switch language / Cambiar idioma" title="ES / EN">
        <span id="lang-label">ES</span>
      </button>
      <button id="settings-btn" class="icon-btn" aria-label="Settings / Configuración">
        <span id="api-dot" class="api-dot"></span>
        ⚙️
      </button>
    </div>
    <!-- iOS install tip (shown only on iOS) -->
    <div id="ios-install-tip" class="ios-install-tip hidden" role="tooltip">
      <span id="ios-tip-text"></span>
      <button class="ios-tip-close" onclick="document.getElementById('ios-install-tip').classList.add('hidden')">✕</button>
    </div>
  </header>

  <!-- Disclaimer banner (persistent) -->
  <div id="disclaimer-bar" class="disclaimer-bar" role="note">
    <span>⚠️</span>
    <span id="banner-text" data-i18n="banner_text"></span>
  </div>

  <!-- ══════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════ -->
  <main>

    <!-- ─── SECTION: The Cards ─── -->
    <section id="arcanos" class="section active" aria-label="Card library">

      <div class="section-header">
        <h1 data-i18n="cards_title"></h1>
        <p class="section-subtitle" data-i18n="cards_subtitle"></p>
      </div>

      <div class="filter-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="search" id="card-search" aria-label="Search card" autocomplete="off">
        </div>
        <div class="filter-pills" role="group">
          <button class="pill active" data-filter="all">
            <span data-i18n="filter_all"></span>
            <span class="pill-count" id="count-all"></span>
          </button>
          <button class="pill" data-filter="mayor" data-i18n="filter_mayor"></button>
          <button class="pill" data-filter="bastos" data-i18n="filter_bastos"></button>
          <button class="pill" data-filter="copas" data-i18n="filter_copas"></button>
          <button class="pill" data-filter="espadas" data-i18n="filter_espadas"></button>
          <button class="pill" data-filter="oros" data-i18n="filter_oros"></button>
        </div>
      </div>

      <div id="cards-grid" class="cards-grid" role="list"></div>
      <p id="no-results" class="no-results hidden" data-i18n="no_results"></p>
    </section>

    <!-- ─── SECTION: Your Reading ─── -->
    <section id="lectura" class="section hidden" aria-label="Personalized reading">

      <div class="section-header">
        <h1 data-i18n="reading_title"></h1>
        <p class="section-subtitle" data-i18n="reading_subtitle"></p>
      </div>

      <!-- No API key notice -->
      <div id="api-notice" class="api-notice hidden">
        <div class="api-notice-icon">🔑</div>
        <div>
          <strong data-i18n="api_notice_title"></strong>
          <p data-i18n="api_notice_body"></p>
        </div>
        <button class="btn-secondary" onclick="window.openSettings()" data-i18n="api_notice_btn"></button>
      </div>

      <div class="reading-container">

        <!-- Step 1: Upload image -->
        <div class="reading-step">
          <div class="step-label">
            <span class="step-num">1</span>
            <span data-i18n="step1_label"></span>
          </div>
          <div class="upload-zone" id="upload-zone" role="button" tabindex="0">
            <input type="file" id="image-input"  accept="image/*" hidden>
            <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
            <div class="upload-placeholder" id="upload-placeholder">
              <div class="upload-icon">🃏</div>
              <p id="upload-title-text"></p>
              <p class="upload-hint" data-i18n="upload_hint"></p>
              <div class="upload-actions">
                <button class="upload-action-btn" id="gallery-btn" type="button">
                  <span class="upload-action-icon">🖼️</span>
                  <span data-i18n="upload_gallery"></span>
                </button>
                <button class="upload-action-btn" id="camera-btn" type="button">
                  <span class="upload-action-icon">📷</span>
                  <span data-i18n="upload_camera"></span>
                </button>
              </div>
            </div>
            <div class="upload-preview hidden" id="upload-preview">
              <img id="preview-img" src="" alt="Spread preview">
              <button id="clear-image-btn" class="clear-img-btn" aria-label="Remove image">✕</button>
            </div>
          </div>
        </div>

        <!-- Step 2: Question -->
        <div class="reading-step">
          <div class="step-label">
            <span class="step-num">2</span>
            <span data-i18n="step2_label"></span>
          </div>
          <textarea id="question-input" rows="4" maxlength="600"></textarea>
          <p class="char-count"><span id="char-count">0</span>/600</p>
        </div>

        <!-- Interpret button -->
        <button id="read-btn" class="btn-read" disabled>
          <span class="read-btn-icon">✦</span>
          <span id="read-btn-text" data-i18n="read_btn"></span>
        </button>

        <!-- Result -->
        <div id="reading-result" class="reading-result hidden" aria-live="polite">
          <div class="result-header">
            <h3 data-i18n="result_title"></h3>
            <div class="result-disclaimer" data-i18n="result_disclaimer"></div>
          </div>
          <div id="result-content" class="result-content"></div>

          <!-- Follow-up conversation (appears after initial reading) -->
          <div id="followup-section" class="followup-section hidden">
            <div class="followup-header">
              <span class="followup-header-icon">✦</span>
              <span data-i18n="followup_title"></span>
            </div>
            <div id="chat-history" class="chat-history"></div>
            <div class="followup-input-row">
              <textarea id="followup-input" rows="2" maxlength="400"></textarea>
              <button id="followup-btn" class="btn-followup" disabled>
                <span id="followup-btn-text" data-i18n="followup_btn"></span>
              </button>
            </div>
          </div>

          <div class="result-actions">
            <button id="new-reading-btn" class="btn-secondary" data-i18n="new_reading"></button>
          </div>
        </div>

      </div>
    </section>

    <!-- ─── SECTION: FAQ ─── -->
    <section id="faq" class="section hidden" aria-label="FAQ">
      <div class="section-header">
        <h1 data-i18n="faq_title"></h1>
        <p class="section-subtitle" data-i18n="faq_subtitle"></p>
      </div>
      <div id="faq-container" class="faq-container">
        <!-- Rendered dynamically by app.js -->
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <p>
      <span data-i18n="footer_images"></span>
      <a href="https://en.wikipedia.org/wiki/Rider%E2%80%93Waite_Tarot" target="_blank" rel="noopener" data-i18n="footer_source"></a>
      · <span data-i18n="footer_credit"></span>
    </p>
    <p data-i18n="footer_disclaimer"></p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
